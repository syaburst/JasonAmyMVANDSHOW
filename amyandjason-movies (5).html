<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#e8536a;--rose-l:#f07d8e;
  --teal:#3ecfb2;
  --cream:#f5f0e8;--ink:#0c0a14;
  --bd:rgba(255,255,255,0.09);
  --muted:rgba(255,255,255,0.3);
  --dim:rgba(255,255,255,0.06);
}
html,body{min-height:100vh}
body{font-family:'Outfit',sans-serif;background:var(--ink);color:var(--cream);overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:var(--ink);contain:strict}
.orb{position:absolute;border-radius:50%;filter:blur(80px);will-change:transform;animation:drift linear infinite}
.o1{width:600px;height:600px;background:#c0274a;top:-220px;left:-170px;animation-duration:26s;opacity:.32}
.o2{width:460px;height:460px;background:#7b1fa2;top:4%;right:-130px;animation-duration:32s;animation-delay:-10s;opacity:.28}
.o3{width:520px;height:520px;background:#00796b;bottom:-120px;left:14%;animation-duration:38s;animation-delay:-18s;opacity:.24}
.o4{width:320px;height:320px;background:#6a1fa2;bottom:14%;right:4%;animation-duration:28s;animation-delay:-7s;opacity:.26}
.o5{width:280px;height:280px;background:#e91e8c;top:40%;left:36%;animation-duration:22s;animation-delay:-14s;opacity:.20}
@keyframes drift{0%{transform:translate(0,0)}33%{transform:translate(40px,-35px)}66%{transform:translate(-25px,50px)}100%{transform:translate(0,0)}}
#catCanvas{position:absolute;inset:0;width:100%;height:100%}
.bg-glass{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(12,10,20,.05) 0%,rgba(12,10,20,.72) 52%,rgba(12,10,20,.97) 100%)}

<script>
(function(){
  const cv = document.getElementById('catCanvas');
  const cx = cv.getContext('2d');
  let W, H;

  // Cat emoji variants for variety
  const CAT_EMOJIS = ['🐱','😸','😻','🐈','😺','🙀','😹'];

  // Create cats with random properties
  function mkCat() {
    const size = 16 + Math.random() * 22; // 16–38px, kept small & subtle
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (0.18 + Math.random() * 0.32) * (Math.random() < 0.5 ? 1 : -1),
      vy: (0.08 + Math.random() * 0.2) * (Math.random() < 0.3 ? 1 : -1),
      size,
      emoji: CAT_EMOJIS[Math.floor(Math.random() * CAT_EMOJIS.length)],
      alpha: 0.12 + Math.random() * 0.18, // very faint — 12-30% opacity
      wobblePhase: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.3 + Math.random() * 0.5,
      rot: (Math.random() - 0.5) * 0.4,
    };
  }

  let cats = [];

  function init() {
    W = cv.width = window.innerWidth;
    H = cv.height = window.innerHeight;
    // ~1 cat per 28000px² — very sparse so it's not distracting
    const count = Math.min(28, Math.floor((W * H) / 28000));
    cats = Array.from({ length: count }, mkCat);
  }

  let last = 0;
  function frame(ts) {
    const dt = Math.min(ts - last, 50); last = ts;
    cx.clearRect(0, 0, W, H);

    const now = ts / 1000;
    cats.forEach(c => {
      // Gentle vertical wobble
      const wobbleY = Math.sin(now * c.wobbleSpeed + c.wobblePhase) * 0.6;

      c.x += c.vx * (dt / 16);
      c.y += c.vy * (dt / 16) + wobbleY * 0.05;

      // Wrap around edges
      if (c.x > W + 40)  c.x = -40;
      if (c.x < -40)     c.x = W + 40;
      if (c.y > H + 40)  c.y = -40;
      if (c.y < -40)     c.y = H + 40;

      cx.save();
      cx.globalAlpha = c.alpha;
      cx.translate(c.x, c.y);
      // Flip horizontally when moving left so cats face their direction
      if (c.vx < 0) { cx.scale(-1, 1); }
      cx.rotate(c.rot);
      cx.font = `${c.size}px serif`;
      cx.textAlign = 'center';
      cx.textBaseline = 'middle';
      cx.fillText(c.emoji, 0, 0);
      cx.restore();
    });

    requestAnimationFrame(frame);
  }

  init();
  window.addEventListener('resize', init);
  requestAnimationFrame(frame);
})();
</script>

<script>
// ── CONFIG ──
const TMDB_KEY = '1fb52a7a62301434dc6eb6a2d3333dd7';
const BASE     = 'https://api.themoviedb.org/3';
const IMG      = 'https://image.tmdb.org/t/p/w185';
const IMG_SM   = 'https://image.tmdb.org/t/p/w92';

// ── JSONBIN DATABASE ──
const BIN_ID  = '69e98e5a36566621a8e0d284';
const BIN_KEY = '$2a$10$GL1r8IMj8nhH7eextfsdoe0apTKkRpMgL4AOmB7857ZWxVfIjkr/q';
const DB_URL  = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let entries = [];
let filter = 'all', sType = 'all', panelOpen = false;
let pending = null, ddRes = [], ddIdx = -1, timer = null;

// ── SYNC STATUS ──
function setSyncStatus(state) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLbl');
  if (state === 'live') {
    dot.className = 'sync-dot';
    dot.style.background = '#3ecfb2';
    lbl.textContent = 'Live · Shared with Amy';
  } else if (state === 'syncing') {
    dot.className = 'sync-dot syncing';
    dot.style.background = '#f0c060';
    lbl.textContent = 'Syncing…';
  } else {
    dot.className = 'sync-dot';
    dot.style.background = '#e8536a';
    lbl.textContent = 'Offline – changes saved locally';
  }
}

// ── LOAD ──
async function loadFromDB() {
  try {
    const res = await fetch(DB_URL + '/latest', {
      headers: { 'X-Master-Key': BIN_KEY }
    });
    if (!res.ok) throw new Error('fetch failed');
    const json = await res.json();
    let data = json.record;
    if (Array.isArray(data)) {
      data = data.filter(e => e && typeof e === 'object' && e.title);
    } else {
      data = [];
    }
    entries = data;
    localStorage.setItem('aj_v5', JSON.stringify(entries));
    setSyncStatus('live');
    render();
  } catch (e) {
    const local = localStorage.getItem('aj_v5');
    if (local) entries = JSON.parse(local);
    setSyncStatus('offline');
    render();
  }
}

// ── SAVE ──
async function saveToDB() {
  setSyncStatus('syncing');
  localStorage.setItem('aj_v5', JSON.stringify(entries));
  try {
    const res = await fetch(DB_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': BIN_KEY
      },
      body: JSON.stringify(entries)
    });
    if (!res.ok) throw new Error('save failed');
    setSyncStatus('live');
  } catch (e) {
    setSyncStatus('offline');
  }
}

// ── POLL FOR UPDATES (every 6s) ──
let _lastHash = '';
setInterval(async () => {
  try {
    const res = await fetch(DB_URL + '/latest', {
      headers: { 'X-Master-Key': BIN_KEY }
    });
    if (!res.ok) return;
    const json = await res.json();
    let data = json.record;
    if (Array.isArray(data)) data = data.filter(e => e && e.title);
    else data = [];
    const hash = JSON.stringify(data);
    if (hash !== _lastHash && hash !== JSON.stringify(entries)) {
      entries = data;
      _lastHash = hash;
      localStorage.setItem('aj_v5', JSON.stringify(entries));
      render();
      showToast('Watchlist updated ✓');
    }
    _lastHash = hash;
    setSyncStatus('live');
  } catch(e) {
    setSyncStatus('offline');
  }
}, 6000);

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── PANEL ──
function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('addPanel').style.display = panelOpen ? 'block' : 'none';
  document.getElementById('toggleLbl').textContent  = panelOpen ? 'Close' : 'Add a movie or show';
  document.getElementById('plusIcon').textContent   = panelOpen ? '×' : '+';
  if (panelOpen) {
    setTimeout(() => document.getElementById('luInput').focus(), 60);
    document.addEventListener('mousedown', outsideClick, true);
  } else {
    resetPanel();
    document.removeEventListener('mousedown', outsideClick, true);
  }
}
function outsideClick(e) { if (!document.getElementById('luWrap').contains(e.target)) closeDD(); }

function setST(t) {
  sType = t;
  ['All','Movie','Show'].forEach(x => {
    const el = document.getElementById('t'+x);
    if (el) el.className = 'tbtn' + (t === x.toLowerCase() ? ' on' : '');
  });
  document.getElementById('tAll').className = 'tbtn' + (t === 'all' ? ' on' : '');
  onType();
}

function resetPanel() {
  document.getElementById('luInput').value = '';
  document.getElementById('preview').className = 'preview';
  closeDD(); pending = null;
}

// ── SEARCH ──
function onType() {
  const q = document.getElementById('luInput').value.trim();
  clearTimeout(timer);
  if (q.length < 1) { closeDD(); return; }
  timer = setTimeout(() => fetchDD(q), 320);
}

async function fetchDD(q) {
  showMsg('Searching…');
  try {
    const url = `${BASE}/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&include_adult=false&page=1`;
    const resp = await fetch(url);
    if (!resp.ok) { showMsg(`Search error (${resp.status}) – try again.`); return; }
    const d = await resp.json();
    let res = (d.results||[]).filter(x => x.media_type==='movie' || x.media_type==='tv');
    if (sType==='movie') res = res.filter(x => x.media_type==='movie');
    if (sType==='show')  res = res.filter(x => x.media_type==='tv');
    res.sort((a,b) => (b.popularity||0) - (a.popularity||0));
    ddRes = res.slice(0,12);
    renderDD();
  } catch(e) { showMsg('Search unavailable – check your internet connection.'); }
}

function showMsg(t) { const dd=document.getElementById('dd'); dd.innerHTML=`<div class="dd-msg">${t}</div>`; dd.style.display='block'; }
function closeDD()  { document.getElementById('dd').style.display='none'; ddRes=[]; ddIdx=-1; }

function renderDD() {
  const dd = document.getElementById('dd');
  if (!ddRes.length) { showMsg('No results — try a different spelling.'); return; }
  dd.innerHTML = ddRes.map((r,i) => {
    const mv    = r.media_type==='movie';
    const title = mv ? r.title : r.name;
    const year  = (mv ? r.release_date : r.first_air_date||'').slice(0,4);
    const poster= r.poster_path ? `<img class="ddi-img" src="${IMG_SM}${r.poster_path}" loading="lazy" alt="">` : `<div class="ddi-ph">${mv?'🎬':'📺'}</div>`;
    const rat   = r.vote_average ? `⭐ ${r.vote_average.toFixed(1)}` : '';
    return `<div class="ddi" onclick="pickResult(${i})">${poster}<div class="ddi-info"><div class="ddi-name">${esc(title)}</div><div class="ddi-meta"><span class="ddi-badge ${mv?'movie':'show'}">${mv?'Movie':'Show'}</span>${year?`<span class="ddi-sub">${year}</span>`:''}${rat?`<span class="ddi-sub">${rat}</span>`:''}</div></div></div>`;
  }).join('');
  dd.style.display = 'block';
}

function onKey(e) {
  const dd = document.getElementById('dd');
  if (dd.style.display==='none') return;
  if      (e.key==='ArrowDown') { ddIdx=Math.min(ddIdx+1,ddRes.length-1); hlDD(); e.preventDefault(); }
  else if (e.key==='ArrowUp')   { ddIdx=Math.max(ddIdx-1,0); hlDD(); e.preventDefault(); }
  else if (e.key==='Enter' && ddIdx>=0) { pickResult(ddIdx); e.preventDefault(); }
  else if (e.key==='Escape') { closeDD(); }
}
function hlDD() { document.querySelectorAll('.ddi').forEach((el,i) => el.classList.toggle('hi', i===ddIdx)); }

async function pickResult(i) {
  const r = ddRes[i]; closeDD();
  document.getElementById('luInput').value = r.media_type==='movie' ? r.title : r.name;
  showMsg('Loading details…'); document.getElementById('dd').style.display='block';
  try {
    const ep   = r.media_type==='movie' ? `${BASE}/movie/${r.id}?api_key=${TMDB_KEY}` : `${BASE}/tv/${r.id}?api_key=${TMDB_KEY}`;
    const data = await (await fetch(ep)).json();
    closeDD();
    const mv     = r.media_type==='movie';
    const title  = mv ? data.title : data.name;
    const year   = (mv ? data.release_date : data.first_air_date||'').slice(0,4);
    const genre  = (data.genres||[]).map(g=>g.name).slice(0,2).join(', ');
    const poster = data.poster_path ? IMG+data.poster_path : '';
    let runtime  = '';
    if (mv) { const m=data.runtime||0; if(m) runtime=`${Math.floor(m/60)}h ${m%60}m`; }
    else { const s=data.number_of_seasons||0, ep2=data.number_of_episodes||0; runtime=s?`${s} Season${s!==1?'s':''} · ${ep2} Episodes`:''; }
    const rat = data.vote_average ? data.vote_average.toFixed(1) : '';
    pending = { id:Date.now(), title, type:mv?'movie':'show', genre, runtime, year, poster, desc:data.overview||'', watched:false, rating:0, addedAt:Date.now() };
    document.getElementById('prevImg').innerHTML   = poster ? `<img class="prev-img" src="${poster}" alt="">` : `<div class="prev-ph">${mv?'🎬':'📺'}</div>`;
    document.getElementById('prevName').textContent = title;
    document.getElementById('prevDesc').textContent = data.overview||'';
    document.getElementById('prevChips').innerHTML  = [genre?chip(genre):'', runtime?chip('⏱ '+runtime):'', year?chip('📅 '+year):'', rat?chip('⭐ '+rat):''].filter(Boolean).join('');
    document.getElementById('preview').className = 'preview show';
  } catch(e) { closeDD(); alert('Could not load details. Try again.'); }
}

function chip(t) { return `<span class="chip">${t}</span>`; }
function esc(s)  { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function confirmAdd() {
  if (!pending) return;
  if (entries.find(e => e.title.toLowerCase()===pending.title.toLowerCase() && e.type===pending.type)) {
    alert(`"${pending.title}" is already in your ${pending.type} list!`); return;
  }
  entries.unshift(pending);
  await saveToDB();
  resetPanel(); togglePanel(); render();
  showToast('Added to your shared watchlist ✓');
}

// ── FILTERS ──
function setF(f, el) {
  filter = f;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
  el.classList.add('on'); render();
}

// ── ACTIONS ──
async function toggleWatched(id) { const e=entries.find(x=>x.id===id); if(e){ e.watched=!e.watched; await saveToDB(); render(); } }
async function delEntry(id)      { entries=entries.filter(x=>x.id!==id); await saveToDB(); render(); }
async function setRating(id,r)   { const e=entries.find(x=>x.id===id); if(e){ e.rating=e.rating===r?0:r; await saveToDB(); render(); } }

// ── RENDER ──
function render() {
  const q    = document.getElementById('searchInput').value.trim().toLowerCase();
  const sort = document.querySelector('.sort-sel').value;

  let list = entries.filter(e => {
    if (q && !e.title.toLowerCase().includes(q) && !(e.genre||'').toLowerCase().includes(q)) return false;
    if (filter==='movie')     return e.type==='movie';
    if (filter==='show')      return e.type==='show';
    if (filter==='watched')   return e.watched;
    if (filter==='unwatched') return !e.watched;
    return true;
  });

  list = [...list].sort((a,b) => {
    if (sort==='title')  return a.title.localeCompare(b.title);
    if (sort==='rating') return b.rating - a.rating;
    if (sort==='year')   return (b.year||'').localeCompare(a.year||'');
    return b.addedAt - a.addedAt;
  });

  const total=entries.length, watched=entries.filter(e=>e.watched).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="sn">${total}</div><div class="sl">Total</div></div>
    <div class="stat"><div class="sn">${watched}</div><div class="sl">Watched</div></div>
    <div class="stat"><div class="sn">${total-watched}</div><div class="sl">Queue</div></div>
    <div class="stat"><div class="sn">${entries.filter(e=>e.type==='movie').length}</div><div class="sl">Movies</div></div>
    <div class="stat"><div class="sn">${entries.filter(e=>e.type==='show').length}</div><div class="sl">Shows</div></div>`;

  const labels = { all:'Everything', movie:'Movies', show:'Shows', watched:'Watched', unwatched:'To Watch' };
  document.getElementById('listLbl').textContent = (q ? `"${q}"` : labels[filter]) + ` · ${list.length}`;

  const el = document.getElementById('listEl');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🎬</div><div class="empty-text">${q ? 'Nothing in your list matches.' : 'Your watchlist is empty — add something!'}</div></div>`;
    return;
  }

  function renderCard(e) {
    const stars = [1,2,3,4,5].map(s => `<span class="star${e.rating>=s?' on':''}" onclick="event.stopPropagation();setRating(${e.id},${s})">★</span>`).join('');
    const imgEl = e.poster ? `<img class="card-img" src="${e.poster}" alt="" loading="lazy">` : `<div class="card-ph">${e.type==='movie'?'🎬':'📺'}</div>`;
    const meta  = [
      e.genre   ? `<span class="cbit">${esc(e.genre)}</span>`   : '',
      e.runtime ? `<span class="cbit">⏱ ${esc(e.runtime)}</span>` : '',
      e.year    ? `<span class="cbit">📅 ${e.year}</span>`       : '',
    ].filter(Boolean).join('');
    return `<div class="card${e.watched?' done':''}" onclick="toggleWatched(${e.id})">
      ${imgEl}
      <div class="chk"><span class="chkv">✓</span></div>
      <div class="cbody">
        <div class="cname">${esc(e.title)}</div>
        <div class="cmeta"><span class="cbadge ${e.type}">${e.type==='movie'?'Movie':'Show'}</span>${meta}</div>
      </div>
      <div class="cright">
        <button class="del" onclick="event.stopPropagation();delEntry(${e.id})">✕</button>
        <div class="stars">${stars}</div>
      </div>
    </div>`;
  }

  // In "All" view (no search, no specific filter) split into Movies / Shows sections
  if (filter === 'all' && !q) {
    const movies = list.filter(e => e.type === 'movie');
    const shows  = list.filter(e => e.type === 'show');
    let html = '';
    if (movies.length) {
      html += `<div class="section-hdr"><span class="section-icon">🎬</span> Movies <span class="section-count">${movies.length}</span></div>`;
      html += movies.map(renderCard).join('');
    }
    if (shows.length) {
      html += `<div class="section-hdr" style="margin-top:${movies.length?'1.5rem':'0'}"><span class="section-icon">📺</span> Shows <span class="section-count">${shows.length}</span></div>`;
      html += shows.map(renderCard).join('');
    }
    el.innerHTML = html;
  } else {
    el.innerHTML = list.map(renderCard).join('');
  }
}

// ── INIT ──
(async () => {
  setSyncStatus('syncing');
  await loadFromDB();
})();
</script>
